<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5dda7;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      gap: 8px;
      justify-content: center;
      margin: 20px auto;
    }

    .cell {
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem; /* BIG so it fills square */
      font-weight: bold;
      background: white;
      border: 2px solid black;
      cursor: pointer;
    }

    .cell.x {
      color: blue;
    }

    .cell.o {
      color: red;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>

<div>
  <button onclick="startGame(true)">Go First</button>
  <button onclick="startGame(false)">Go Second</button>
</div>

<h3 id="status">Choose to go first or second</h3>

<div id="board"></div>

<h3>
  Player: <span id="playerScore">0</span> |
  Computer: <span id="computerScore">0</span>
</h3>

<button onclick="tryAgain()">Try Again</button>
<button onclick="resetMatch()">Reset Match</button>

<script>
let board = ["", "", "", "", "", "", "", "", ""];
let player = "X";
let computer = "O";
let currentTurn = "X";
let gameActive = false;
let playerFirstChoice = true;

let playerScore = 0;
let computerScore = 0;

const boardDiv = document.getElementById("board");
const statusText = document.getElementById("status");

function startGame(playerFirst) {
  playerFirstChoice = playerFirst;
  resetBoard();
}

function resetBoard() {
  board = ["", "", "", "", "", "", "", "", ""];
  gameActive = true;
  currentTurn = playerFirstChoice ? player : computer;

  drawBoard();
  statusText.textContent = currentTurn === player ? "Your turn" : "Computer's turn";

  if (currentTurn === computer) {
    setTimeout(computerMove, 500);
  }
}

function tryAgain() {
  if (playerScore === 3 || computerScore === 3) return;
  resetBoard();
}

function drawBoard() {
  boardDiv.innerHTML = "";
  board.forEach((cell, index) => {
    const div = document.createElement("div");
    div.classList.add("cell");

    if (cell === "X") div.classList.add("x");
    if (cell === "O") div.classList.add("o");

    div.textContent = cell;
    div.onclick = () => playerMove(index);

    boardDiv.appendChild(div);
  });
}

function playerMove(index) {
  if (!gameActive || board[index] !== "" || currentTurn !== player) return;

  board[index] = player;
  currentTurn = computer;
  drawBoard();

  if (checkGameEnd()) return;

  statusText.textContent = "Computer's turn";
  setTimeout(computerMove, 400);
}

function computerMove() {
  if (!gameActive) return;

  let move = findBestMove();
  board[move] = computer;
  currentTurn = player;
  drawBoard();

  if (checkGameEnd()) return;

  statusText.textContent = "Your turn";
}

function findBestMove() {
  // Win
  for (let i = 0; i < 9; i++) {
    if (board[i] === "") {
      board[i] = computer;
      if (checkWinner(board, computer)) {
        board[i] = "";
        return i;
      }
      board[i] = "";
    }
  }

  // Block
  for (let i = 0; i < 9; i++) {
    if (board[i] === "") {
      board[i] = player;
      if (checkWinner(board, player)) {
        board[i] = "";
        return i;
      }
      board[i] = "";
    }
  }

  // Random
  let empty = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
  return empty[Math.floor(Math.random() * empty.length)];
}

function checkWinner(b, p) {
  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  return wins.some(combo => combo.every(i => b[i] === p));
}

function checkGameEnd() {
  if (checkWinner(board, player)) {
    playerScore++;
    document.getElementById("playerScore").textContent = playerScore;
    statusText.textContent = "You win!";
    gameActive = false;
    checkMatchWinner();
    return true;
  }

  if (checkWinner(board, computer)) {
    computerScore++;
    document.getElementById("computerScore").textContent = computerScore;
    statusText.textContent = "Computer wins!";
    gameActive = false;
    checkMatchWinner();
    return true;
  }

  if (!board.includes("")) {
    statusText.textContent = "Draw!";
    gameActive = false;
    return true;
  }

  return false;
}

function checkMatchWinner() {
  if (playerScore === 3) {
    statusText.textContent = "🏆 You won the match!";
  }
  if (computerScore === 3) {
    statusText.textContent = "💻 Computer won the match!";
  }
}

function resetMatch() {
  playerScore = 0;
  computerScore = 0;
  document.getElementById("playerScore").textContent = 0;
  document.getElementById("computerScore").textContent = 0;
  statusText.textContent = "Choose to go first or second";
  boardDiv.innerHTML = "";
}
</script>

</body>
</html>
